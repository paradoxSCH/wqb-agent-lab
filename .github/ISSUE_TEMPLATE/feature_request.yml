name: Feature request
description: Propose an improvement to the local research agent or its public interfaces.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which research or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe inputs, outputs, and the expected agent or user interaction.
    validations:
      required: true
  - type: textarea
    id: evaluation
    attributes:
      label: Evaluation
      description: How should we measure whether this improves quality, throughput, or maintainability?
    validations:
      required: true
