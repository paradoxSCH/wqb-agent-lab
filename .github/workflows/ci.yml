name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  python-quality-test:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-${{ matrix.python }}-

      - name: Install uv
        run: python -m pip install uv

      - name: Install locked Python dependencies
        run: uv sync --extra dev --extra mcp --frozen

      - name: Install locked TypeScript dependencies
        run: |
          npm ci --prefix packages/wqb-agent-mcp
          npm ci --prefix packages/wqb-agent-ui

      - name: Run repository checks
        run: uv run python -m scripts.dev check --json

      - name: Run complete tests
        run: uv run python -m scripts.dev test --json

  node-verification:
    name: Node ${{ matrix.node }} packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            packages/wqb-agent-mcp/package-lock.json
            packages/wqb-agent-ui/package-lock.json

      - name: Install uv and locked Python dependencies
        run: |
          python -m pip install uv
          uv sync --extra dev --extra mcp --frozen

      - name: Install locked TypeScript dependencies
        run: |
          npm ci --prefix packages/wqb-agent-mcp
          npm ci --prefix packages/wqb-agent-ui

      - name: Build all artifacts through the canonical command
        run: uv run python -m scripts.dev build --json

  release-verification:
    name: Release verification
    runs-on: ubuntu-latest
    needs: [python-quality-test, node-verification]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            packages/wqb-agent-mcp/package-lock.json
            packages/wqb-agent-ui/package-lock.json

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-3.12-

      - name: Install locked dependencies
        run: |
          python -m pip install uv
          uv sync --extra dev --extra mcp --frozen
          npm ci --prefix packages/wqb-agent-mcp
          npm ci --prefix packages/wqb-agent-ui

      - name: Scan repository secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Run complete release verification
        run: uv run python -m scripts.dev release-check --json

      - name: Upload release and audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-reports
          if-no-files-found: warn
          path: |
            dist/audit
            dist/packages
            dist/public-snapshot
