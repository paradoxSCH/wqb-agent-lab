name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            packages/wqb-agent-mcp/package-lock.json
            packages/wqb-agent-ui/package-lock.json

      - name: Install locked dependencies
        run: |
          python -m pip install uv==0.11.27
          uv sync --extra dev --extra mcp --frozen
          npm ci --prefix packages/wqb-agent-mcp
          npm ci --prefix packages/wqb-agent-ui

      - name: Verify release candidate
        run: |
          uv run python -m scripts.checks.release_version --tag "$GITHUB_REF_NAME" --json
          uv run python -m scripts.dev release-check --json

      - name: Create checksums
        shell: bash
        run: |
          find dist/packages dist/audit -type f \
            \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.cdx.json' \) \
            -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/packages/*
            dist/audit/*.cdx.json
            dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find dist/packages dist/audit -type f \
            \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.cdx.json' \) -print0)
          prerelease=()
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc)[0-9]+$ ]]; then
            prerelease=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" dist/SHA256SUMS \
            --title "$GITHUB_REF_NAME" --generate-notes "${prerelease[@]}"
